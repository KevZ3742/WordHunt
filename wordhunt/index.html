<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Word Hunt</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0f1e;
  --surface: #111827;
  --surface2: #1a2436;
  --border: #1e3a5f;
  --accent: #00d4ff;
  --accent2: #00ff88;
  --gold: #ffd93d;
  --red: #ff4757;
  --white: #e8f4fd;
  --muted: #4a6fa5;
  --text: #c9dff0;
  --grid-size: min(90vw, 420px);
}

html, body {
  background: var(--bg); color: var(--white);
  font-family: 'Syne', sans-serif;
  min-height: 100vh; overflow-x: hidden;
  touch-action: none;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 15%, rgba(0,212,255,.08) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 80% 80%, rgba(0,255,136,.06) 0%, transparent 60%);
  pointer-events: none;
}

/* SCREENS */
.screen { display: none; position: relative; z-index: 1; }
.screen.active { display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

/* ── TITLE SCREEN ── */
#s-title {
  justify-content: center; padding: 2rem 1.5rem; gap: 2rem; text-align: center;
}

.logo-wrap { position: relative; }
.logo {
  font-size: clamp(3.5rem, 14vw, 6rem);
  font-weight: 800; letter-spacing: -.02em;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 60%, var(--gold) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  line-height: 1.1;
}
.logo-sub {
  font-family: 'Space Mono', monospace;
  font-size: .75rem; letter-spacing: .25em;
  color: var(--muted); text-transform: uppercase; margin-top: .4rem;
}

.tile-demo {
  display: flex; gap: 6px; justify-content: center; margin: .5rem 0;
}
.demo-tile {
  width: 38px; height: 38px; border-radius: 8px;
  background: var(--surface); border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Space Mono', monospace; font-size: 1rem; font-weight: 700;
  color: var(--accent); animation: tileFloat 3s ease-in-out infinite;
}
.demo-tile:nth-child(2) { animation-delay: .2s; }
.demo-tile:nth-child(3) { animation-delay: .4s; }
.demo-tile:nth-child(4) { animation-delay: .6s; }
.demo-tile:nth-child(5) { animation-delay: .8s; }
@keyframes tileFloat {
  0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)}
}

.card {
  background: var(--surface); border: 1.5px solid var(--border); border-radius: 16px;
  padding: 1.75rem; width: 100%; max-width: 380px;
}
.card-title {
  font-size: .65rem; letter-spacing: .2em; text-transform: uppercase;
  color: var(--muted); font-family: 'Space Mono', monospace; margin-bottom: 1.2rem;
}

.inp {
  background: var(--bg); border: 1.5px solid var(--border); color: var(--white);
  padding: .8rem 1rem; font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 600;
  outline: none; border-radius: 10px; width: 100%; transition: border-color .2s;
}
.inp:focus { border-color: var(--accent); }
.inp::placeholder { color: var(--muted); }
.inp-code { text-transform: uppercase; text-align: center; letter-spacing: .3em; font-size: 1.2rem; }

.btn {
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: .95rem;
  padding: .75rem 1.75rem; border: none; border-radius: 10px;
  cursor: pointer; transition: all .15s; text-transform: uppercase; letter-spacing: .06em;
  position: relative; overflow: hidden;
}
.btn::after {
  content: ''; position: absolute; inset: 0;
  background: rgba(255,255,255,0); transition: background .15s;
}
.btn:hover::after { background: rgba(255,255,255,.08); }
.btn:active { transform: scale(.97); }
.btn:disabled { opacity: .35; cursor: not-allowed; }

.btn-primary { background: linear-gradient(135deg, var(--accent), #006aff); color: #000; }
.btn-secondary { background: linear-gradient(135deg, var(--accent2), #00aa55); color: #000; }
.btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: linear-gradient(135deg, var(--red), #c0392b); color: #fff; }
.btn-full { width: 100%; }

.field { display: flex; flex-direction: column; gap: .5rem; }
.field + .field { margin-top: .75rem; }

.mode-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; margin-top: 1rem; }
.join-section { margin-top: .75rem; padding-top: .75rem; border-top: 1px solid var(--border); }
.join-row { display: flex; gap: .5rem; margin-top: .5rem; }

/* ── LOBBY ── */
#s-lobby { justify-content: center; padding: 2rem 1.5rem; gap: 1.5rem; text-align: center; }
.room-code-wrap { }
.room-code-label { font-family: 'Space Mono', monospace; font-size: .65rem; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); }
.room-code {
  font-family: 'Space Mono', monospace; font-size: 3rem; font-weight: 700;
  color: var(--accent); letter-spacing: .35em;
  text-shadow: 0 0 30px rgba(0,212,255,.4);
}
.player-list { display: flex; gap: .5rem; flex-wrap: wrap; justify-content: center; }
.player-chip {
  background: var(--surface); border: 1.5px solid var(--border); border-radius: 24px;
  padding: .4rem 1.1rem; font-weight: 600; font-size: .9rem;
}
.player-chip.me { border-color: var(--accent); color: var(--accent); }

/* ── GAME SCREEN ── */
#s-game {
  flex-direction: column; align-items: center;
  padding: .5rem .75rem 1rem; gap: .6rem;
  min-height: 100vh; justify-content: flex-start;
}

.game-header {
  width: 100%; max-width: 480px;
  display: flex; align-items: center; justify-content: space-between;
  padding: .5rem 0;
}
.gh-left { display: flex; align-items: center; gap: .75rem; }
.gh-title { font-size: 1rem; font-weight: 800; color: var(--accent); letter-spacing: -.01em; }

/* Timer */
.timer-ring-wrap { position: relative; width: 52px; height: 52px; flex-shrink: 0; }
.timer-ring {
  transform: rotate(-90deg);
  position: absolute; inset: 0;
}
.timer-bg { fill: none; stroke: var(--border); stroke-width: 4; }
.timer-fill { fill: none; stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset .9s linear, stroke .5s; }
.timer-text {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-family: 'Space Mono', monospace; font-size: .95rem; font-weight: 700; color: var(--white);
}

/* Scoreboard strip */
.score-strip {
  width: 100%; max-width: 480px;
  display: flex; gap: .5rem; overflow-x: auto; padding-bottom: .2rem;
  scrollbar-width: none;
}
.score-strip::-webkit-scrollbar { display: none; }
.score-chip {
  background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px;
  padding: .4rem .85rem; font-size: .78rem; font-weight: 700; white-space: nowrap;
  flex-shrink: 0; transition: all .3s;
}
.score-chip.me { border-color: var(--accent); }
.score-chip.leading { border-color: var(--gold); background: rgba(255,217,61,.06); }
.score-name { color: var(--muted); font-size: .68rem; }
.score-val { color: var(--white); font-size: .9rem; margin-top: .1rem; }

/* Word input row */
.word-row {
  width: 100%; max-width: 480px;
  display: flex; align-items: center; gap: .5rem;
}
.word-display {
  flex: 1; background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px;
  padding: .6rem 1rem; font-family: 'Space Mono', monospace;
  font-size: 1.1rem; font-weight: 700; color: var(--accent2); letter-spacing: .15em;
  min-height: 44px; display: flex; align-items: center; transition: border-color .2s;
}
.word-display.valid { border-color: var(--accent2); }
.word-display.invalid { border-color: var(--red); color: var(--red); }
.word-display.found { border-color: var(--gold); color: var(--gold); }

/* GRID */
.grid-wrap {
  position: relative;
  width: var(--grid-size); height: var(--grid-size); flex-shrink: 0;
}
.grid-svg {
  position: absolute; inset: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 2;
}
.grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
  width: 100%; height: 100%;
}
.tile {
  border-radius: 12px;
  background: var(--surface2); border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Space Mono', monospace; font-size: clamp(1.1rem, 5vw, 1.5rem); font-weight: 700;
  color: var(--text); cursor: pointer; user-select: none;
  transition: background .12s, border-color .12s, transform .1s, color .12s;
  position: relative; z-index: 3;
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
}
.tile:hover { border-color: var(--accent); color: var(--accent); }
.tile.in-path {
  background: linear-gradient(135deg, rgba(0,212,255,.2), rgba(0,255,136,.2));
  border-color: var(--accent); color: var(--accent2);
  transform: scale(1.06);
}
.tile.first-path { background: linear-gradient(135deg, rgba(0,255,136,.3), rgba(0,212,255,.2)); border-color: var(--accent2); }
.tile.disabled { opacity: .3; cursor: not-allowed; }
.tile-index {
  position: absolute; top: 3px; right: 5px;
  font-size: .5rem; color: var(--muted); font-family: 'Space Mono', monospace;
}

/* Path line */
.path-line { stroke: var(--accent); stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; fill: none; opacity: .6; }

/* Found words */
.found-list {
  width: 100%; max-width: 480px;
  display: flex; flex-wrap: wrap; gap: .4rem; justify-content: center;
}
.found-word {
  background: var(--surface); border: 1.5px solid var(--border); border-radius: 20px;
  padding: .25rem .75rem; font-family: 'Space Mono', monospace; font-size: .72rem;
  font-weight: 700; color: var(--accent2); animation: wordPop .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes wordPop { from{opacity:0;transform:scale(.7)} to{opacity:1;transform:scale(1)} }
.found-word .pts { color: var(--muted); font-size: .6rem; }

/* ── END SCREEN ── */
#s-end { justify-content: flex-start; padding: 1.5rem 1rem 2rem; gap: 1rem; align-items: center; }

.winner-banner {
  text-align: center; padding: 1.5rem 2rem; background: var(--surface); border: 1.5px solid var(--gold);
  border-radius: 16px; width: 100%; max-width: 480px;
}
.winner-emoji { font-size: 3rem; display: block; margin-bottom: .5rem; }
.winner-label { font-family: 'Space Mono', monospace; font-size: .65rem; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); }
.winner-name { font-size: 2rem; font-weight: 800; color: var(--gold); }

.results-grid {
  width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: .5rem;
}
.result-row {
  background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px;
  padding: .75rem 1rem; display: flex; align-items: center; justify-content: space-between;
}
.result-row.winner-row { border-color: var(--gold); }
.result-name { font-weight: 700; font-size: .95rem; }
.result-meta { font-family: 'Space Mono', monospace; font-size: .8rem; color: var(--accent); }
.result-words { margin-top: .4rem; display: flex; flex-wrap: wrap; gap: .3rem; }
.result-word-chip {
  font-family: 'Space Mono', monospace; font-size: .65rem;
  background: var(--surface2); border-radius: 4px; padding: .15rem .5rem; color: var(--muted);
}
.result-word-chip.long { color: var(--accent2); }

.all-words-section { width: 100%; max-width: 480px; }
.all-words-header {
  font-family: 'Space Mono', monospace; font-size: .65rem; letter-spacing: .2em;
  text-transform: uppercase; color: var(--muted); margin-bottom: .75rem;
}
.all-words-grid {
  display: flex; flex-wrap: wrap; gap: .4rem;
}
.aw-chip {
  font-family: 'Space Mono', monospace; font-size: .72rem;
  background: var(--surface); border: 1.5px solid var(--border); border-radius: 6px;
  padding: .25rem .65rem; color: var(--text); transition: all .15s;
}
.aw-chip.found-by-me { border-color: var(--accent2); color: var(--accent2); background: rgba(0,255,136,.06); }
.aw-chip.missed { color: var(--muted); }
.aw-chip .aw-len { font-size: .55rem; color: var(--muted); }

/* ── OVERLAYS & TOASTS ── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.85);
  display: none; align-items: center; justify-content: center; z-index: 500;
  backdrop-filter: blur(8px);
}
.overlay.show { display: flex; }

.toast {
  position: fixed; top: 1rem; left: 50%; transform: translateX(-50%);
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 8px; padding: .55rem 1.4rem;
  font-family: 'Space Mono', monospace; font-size: .8rem;
  color: var(--white); z-index: 999; opacity: 0; transition: opacity .2s;
  pointer-events: none; white-space: nowrap; max-width: 90vw; text-align: center;
}
.toast.show { opacity: 1; }
.toast.good { border-color: var(--accent2); color: var(--accent2); }
.toast.bad { border-color: var(--red); color: var(--red); }

/* Score pop animation */
.score-pop {
  position: fixed; font-family: 'Space Mono', monospace; font-size: 1.2rem; font-weight: 700;
  color: var(--accent2); pointer-events: none; z-index: 400;
  animation: scorePop 1.2s ease forwards;
}
@keyframes scorePop {
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-60px) scale(1.3)}
}

/* conn */
.conn-dot { width: 7px; height: 7px; border-radius: 50%; background: #333; display: inline-block; margin-right: 5px; }
.conn-dot.ok { background: var(--accent2); }
.conn-dot.err { background: var(--red); }

.hint { font-size: .78rem; color: var(--muted); font-family: 'Space Mono', monospace; }

/* Swipe instruction */
.swipe-hint {
  font-family: 'Space Mono', monospace; font-size: .65rem; color: var(--muted);
  text-align: center; letter-spacing: .08em;
}
</style>
</head>
<body>

<!-- TITLE -->
<div id="s-title" class="screen active">
  <div class="logo-wrap">
    <div class="logo">Word Hunt</div>
    <div class="logo-sub">Connect letters · Find words</div>
  </div>

  <div class="tile-demo">
    <div class="demo-tile">W</div>
    <div class="demo-tile">O</div>
    <div class="demo-tile">R</div>
    <div class="demo-tile">D</div>
    <div class="demo-tile">S</div>
  </div>

  <div class="card">
    <div class="card-title">Enter your name</div>
    <div class="field">
      <input type="text" class="inp" id="inp-name" placeholder="Your name" maxlength="16" autocomplete="off">
    </div>

    <div class="mode-buttons">
      <button class="btn btn-secondary" onclick="soloStart()">Solo Play</button>
      <button class="btn btn-primary" onclick="createRoom()">Create Room</button>
    </div>

    <div class="join-section">
      <div class="hint" style="margin-bottom:.5rem">Have a code?</div>
      <div class="join-row">
        <input type="text" class="inp inp-code" id="inp-code" placeholder="XXXX" maxlength="4" style="flex:1">
        <button class="btn btn-outline" onclick="joinRoom()">Join</button>
      </div>
    </div>
  </div>

  <div style="font-size:.72rem;color:var(--muted);font-family:'Space Mono',monospace">
    <span class="conn-dot" id="conn-dot"></span><span id="conn-label">connecting…</span>
  </div>
</div>

<!-- LOBBY -->
<div id="s-lobby" class="screen">
  <div style="margin-top:3rem"></div>
  <div class="room-code-wrap" style="text-align:center">
    <div class="room-code-label">Room Code</div>
    <div class="room-code" id="lobby-code">—</div>
    <div class="hint">Share this code with friends</div>
  </div>
  <div class="player-list" id="lobby-players"></div>
  <div id="lobby-action"></div>
  <div class="hint" id="lobby-hint"></div>
</div>

<!-- GAME -->
<div id="s-game" class="screen">
  <div class="game-header">
    <div class="gh-left">
      <div class="gh-title">WORD HUNT</div>
    </div>
    <div class="timer-ring-wrap">
      <svg class="timer-ring" viewBox="0 0 52 52">
        <circle class="timer-bg" cx="26" cy="26" r="22"/>
        <circle class="timer-fill" id="timer-arc" cx="26" cy="22" r="22"
          stroke-dasharray="138.2" stroke-dashoffset="0" stroke="var(--accent2)"/>
      </svg>
      <div class="timer-text" id="g-timer">90</div>
    </div>
  </div>

  <div class="score-strip" id="g-scores"></div>

  <div class="word-row">
    <div class="word-display" id="g-word">—</div>
    <button class="btn btn-outline" style="padding:.6rem .9rem;font-size:.75rem" onclick="clearPath()">✕</button>
  </div>

  <div class="swipe-hint">Drag across letters to form words</div>

  <div class="grid-wrap" id="grid-wrap">
    <svg class="grid-svg" id="path-svg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
    <div class="grid" id="g-grid"></div>
  </div>

  <div class="found-list" id="g-found-list"></div>
</div>

<!-- END SCREEN -->
<div id="s-end" class="screen">
  <div class="winner-banner">
    <span class="winner-emoji" id="end-emoji">🏆</span>
    <div class="winner-label">Winner</div>
    <div class="winner-name" id="end-winner">—</div>
  </div>

  <div class="results-grid" id="end-results"></div>

  <div class="all-words-section">
    <div class="all-words-header">All Possible Words (<span id="aw-count">0</span>)</div>
    <div class="all-words-grid" id="aw-grid"></div>
  </div>

  <div style="display:flex;gap:.75rem;margin-top:1rem">
    <button class="btn btn-primary" onclick="location.reload()">Play Again</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let ws = null;
let myIndex = -1;
let isHost = false;
let gameBoard = null; // array of 16 letters
let currentPath = []; // indices of selected tiles
let myFoundWords = [];
let myScore = 0;
let gamePhase = 'idle';
let totalTime = 90;

// ── CONNECT ──
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  ws.onopen = () => setConn(true);
  ws.onclose = () => { setConn(false); setTimeout(connect, 2000); };
  ws.onerror = () => setConn(false);
  ws.onmessage = e => handleMsg(JSON.parse(e.data));
}

function setConn(ok) {
  const d = document.getElementById('conn-dot');
  const l = document.getElementById('conn-label');
  if (d) d.className = 'conn-dot ' + (ok ? 'ok' : 'err');
  if (l) l.textContent = ok ? 'connected' : 'reconnecting…';
}

function send(obj) { if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj)); }

// ── MESSAGES ──
function handleMsg(msg) {
  switch (msg.type) {
    case 'room_created':
      myIndex = 0; isHost = true;
      showScreen('s-lobby');
      updateLobby([getName()], msg.code, true);
      break;
    case 'room_joined':
      showScreen('s-lobby');
      break;
    case 'lobby':
      updateLobby(msg.players, msg.code, isHost);
      break;
    case 'game_starting':
      toast('🔤 Game starting!', 'good');
      break;
    case 'game_state':
      myIndex = msg.myIndex;
      gameBoard = msg.board;
      gamePhase = msg.phase;
      if (msg.phase === 'playing') {
        showScreen('s-game');
        renderBoard();
        renderScores(msg.players);
        updateTimer(msg.timeLeft);
      } else if (msg.phase === 'ended') {
        // handled by game_over
      }
      break;
    case 'tick':
      updateTimer(msg.timeLeft);
      break;
    case 'score_update':
      renderScores(msg.players);
      break;
    case 'word_result':
      handleWordResult(msg);
      break;
    case 'game_over':
      showEndScreen(msg);
      break;
    case 'error':
      toast('⚠ ' + msg.msg, 'bad');
      break;
    case 'player_left':
      toast(`${msg.name} left`, '');
      break;
  }
}

// ── LOBBY ──
function updateLobby(players, code, amHost) {
  if (code) document.getElementById('lobby-code').textContent = code;
  document.getElementById('lobby-players').innerHTML =
    players.map((n,i) => `<div class="player-chip${i===myIndex?' me':''}">${i===0?'👑 ':''}${n}</div>`).join('');
  const action = document.getElementById('lobby-action');
  const hint = document.getElementById('lobby-hint');
  if (amHost) {
    action.innerHTML = `<button class="btn btn-primary" onclick="startGame()" ${players.length<2?'disabled':''}>Start Game!</button>`;
    hint.textContent = players.length < 2 ? 'Waiting for players…' : `${players.length}/4 ready!`;
  } else {
    action.innerHTML = '';
    hint.textContent = 'Waiting for host to start…';
  }
}

function getName() {
  const n = document.getElementById('inp-name')?.value.trim();
  if (!n) { toast('Enter your name first!', 'bad'); return null; }
  return n;
}

function createRoom() {
  const name = getName(); if (!name) return;
  send({ type: 'create_room', name });
  myIndex = 0; isHost = true;
}

function joinRoom() {
  const name = getName(); if (!name) return;
  const code = document.getElementById('inp-code').value.trim().toUpperCase();
  if (!code) { toast('Enter room code', 'bad'); return; }
  send({ type: 'join_room', name, code });
  myIndex = -1; isHost = false;
}

function soloStart() {
  const name = getName(); if (!name) return;
  myIndex = 0; isHost = true;
  send({ type: 'solo_start', name });
}

function startGame() { send({ type: 'start_game' }); }

// ── BOARD RENDER ──
function renderBoard() {
  if (!gameBoard) return;
  const grid = document.getElementById('g-grid');
  grid.innerHTML = '';
  gameBoard.forEach((letter, i) => {
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.dataset.idx = i;
    tile.innerHTML = letter.toUpperCase() + `<span class="tile-index">${i}</span>`;
    grid.appendChild(tile);
  });
  setupTileInteraction();
  clearPath();
}

// ── TILE INTERACTION (mouse + touch) ──
function setupTileInteraction() {
  const wrap = document.getElementById('grid-wrap');
  let dragging = false;

  function getTileAt(x, y) {
    const els = document.elementsFromPoint(x, y);
    for (const el of els) {
      if (el.classList.contains('tile')) return el;
    }
    return null;
  }

  function addToPath(tile) {
    const idx = parseInt(tile.dataset.idx);
    if (isNaN(idx)) return;
    if (currentPath.includes(idx)) {
      // Allow backtrack
      const pos = currentPath.indexOf(idx);
      if (pos === currentPath.length - 2) {
        const removed = currentPath.pop();
        document.querySelector(`.tile[data-idx="${removed}"]`)?.classList.remove('in-path', 'first-path');
        updateWordDisplay();
        drawPathLines();
      }
      return;
    }
    // Validate adjacency
    if (currentPath.length > 0) {
      const last = currentPath[currentPath.length - 1];
      if (!isAdjacent(last, idx)) return;
    }
    currentPath.push(idx);
    tile.classList.add('in-path');
    if (currentPath.length === 1) tile.classList.add('first-path');
    updateWordDisplay();
    drawPathLines();
  }

  wrap.addEventListener('mousedown', e => {
    const tile = e.target.closest('.tile');
    if (!tile) return;
    dragging = true;
    clearPath();
    addToPath(tile);
    e.preventDefault();
  });

  wrap.addEventListener('mousemove', e => {
    if (!dragging) return;
    const tile = getTileAt(e.clientX, e.clientY)?.closest?.('.tile') || getTileAt(e.clientX, e.clientY);
    if (tile?.classList.contains('tile')) addToPath(tile);
  });

  wrap.addEventListener('mouseup', e => {
    if (!dragging) return;
    dragging = false;
    submitCurrentPath();
  });

  wrap.addEventListener('touchstart', e => {
    clearPath();
    const t = e.touches[0];
    const tile = getTileAt(t.clientX, t.clientY);
    if (tile?.classList.contains('tile')) addToPath(tile);
    e.preventDefault();
  }, { passive: false });

  wrap.addEventListener('touchmove', e => {
    const t = e.touches[0];
    const tile = getTileAt(t.clientX, t.clientY);
    if (tile?.classList.contains('tile')) addToPath(tile);
    e.preventDefault();
  }, { passive: false });

  wrap.addEventListener('touchend', e => {
    submitCurrentPath();
    e.preventDefault();
  }, { passive: false });
}

function isAdjacent(a, b) {
  const ar = Math.floor(a / 4), ac = a % 4;
  const br = Math.floor(b / 4), bc = b % 4;
  return Math.abs(ar - br) <= 1 && Math.abs(ac - bc) <= 1 && !(ar === br && ac === bc);
}

function updateWordDisplay() {
  const wd = document.getElementById('g-word');
  if (currentPath.length === 0) {
    wd.textContent = '—'; wd.className = 'word-display'; return;
  }
  const word = currentPath.map(i => gameBoard[i].toUpperCase()).join('');
  wd.textContent = word;
  if (currentPath.length >= 3) {
    wd.className = 'word-display valid';
  } else {
    wd.className = 'word-display';
  }
}

function clearPath() {
  currentPath.forEach(i => {
    document.querySelector(`.tile[data-idx="${i}"]`)?.classList.remove('in-path', 'first-path');
  });
  currentPath = [];
  updateWordDisplay();
  drawPathLines();
}

function submitCurrentPath() {
  if (currentPath.length < 3) { clearPath(); return; }
  send({ type: 'submit_word', path: currentPath });
  clearPath();
}

// ── PATH LINES ──
function drawPathLines() {
  const svg = document.getElementById('path-svg');
  svg.innerHTML = '';
  if (currentPath.length < 2) return;

  const wrap = document.getElementById('grid-wrap');
  const rect = wrap.getBoundingClientRect();

  const points = currentPath.map(idx => {
    const tile = document.querySelector(`.tile[data-idx="${idx}"]`);
    if (!tile) return null;
    const tr = tile.getBoundingClientRect();
    const x = ((tr.left + tr.width / 2 - rect.left) / rect.width) * 100;
    const y = ((tr.top + tr.height / 2 - rect.top) / rect.height) * 100;
    return `${x},${y}`;
  }).filter(Boolean);

  const polyline = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
  polyline.setAttribute('points', points.join(' '));
  polyline.setAttribute('class', 'path-line');
  svg.appendChild(polyline);
}

// ── WORD RESULT ──
function handleWordResult(msg) {
  const wd = document.getElementById('g-word');
  if (msg.ok) {
    myFoundWords.push(msg.word);
    myScore = msg.score;
    wd.textContent = msg.word.toUpperCase() + ' +' + msg.pts;
    wd.className = 'word-display found';
    addFoundWord(msg.word, msg.pts);
    showScorePop('+' + msg.pts);
    setTimeout(() => { if (wd.classList.contains('found')) { wd.textContent = '—'; wd.className = 'word-display'; } }, 1000);
  } else {
    wd.textContent = msg.msg.toUpperCase();
    wd.className = 'word-display invalid';
    setTimeout(() => { if (wd.classList.contains('invalid')) { wd.textContent = '—'; wd.className = 'word-display'; } }, 800);
  }
}

function addFoundWord(word, pts) {
  const list = document.getElementById('g-found-list');
  const chip = document.createElement('div');
  chip.className = 'found-word';
  chip.innerHTML = `${word.toUpperCase()} <span class="pts">+${pts}</span>`;
  list.prepend(chip);
}

function showScorePop(text) {
  const grid = document.getElementById('grid-wrap');
  const rect = grid.getBoundingClientRect();
  const pop = document.createElement('div');
  pop.className = 'score-pop';
  pop.textContent = text;
  pop.style.left = (rect.left + rect.width / 2 - 30) + 'px';
  pop.style.top = (rect.top - 10) + 'px';
  document.body.appendChild(pop);
  setTimeout(() => pop.remove(), 1300);
}

// ── TIMER ──
function updateTimer(t) {
  const el = document.getElementById('g-timer');
  const arc = document.getElementById('timer-arc');
  if (el) el.textContent = t;
  if (arc) {
    const circ = 138.2;
    const pct = t / totalTime;
    arc.style.strokeDashoffset = circ * (1 - pct);
    arc.style.stroke = t > 30 ? 'var(--accent2)' : t > 10 ? 'var(--gold)' : 'var(--red)';
  }
}

// ── SCORES ──
function renderScores(players) {
  const strip = document.getElementById('g-scores');
  const maxScore = Math.max(...players.map(p => p.score));
  strip.innerHTML = players.map((p, i) => {
    const cls = ['score-chip', i === myIndex ? 'me' : '', p.score === maxScore && p.score > 0 ? 'leading' : ''].filter(Boolean).join(' ');
    return `<div class="${cls}">
      <div class="score-name">${p.name}</div>
      <div class="score-val">${p.score.toLocaleString()} · ${p.wordCount}w</div>
    </div>`;
  }).join('');
}

// ── END SCREEN ──
function showEndScreen(msg) {
  showScreen('s-end');
  const isMe = msg.winner === msg.players[myIndex]?.name;
  document.getElementById('end-emoji').textContent = isMe ? '🏆' : '🎯';
  document.getElementById('end-winner').textContent = msg.winner;

  const sortedPlayers = [...msg.players].sort((a, b) => b.score - a.score);
  document.getElementById('end-results').innerHTML = sortedPlayers.map((p, rank) => {
    const isWinner = rank === 0;
    const words = p.words || [];
    return `<div class="result-row${isWinner?' winner-row':''}">
      <div>
        <div class="result-name">${rank===0?'🥇':rank===1?'🥈':'🥉'} ${p.name}</div>
        <div class="result-words">
          ${words.map(w => `<span class="result-word-chip${w.length>=6?' long':''}">${w}</span>`).join('')}
        </div>
      </div>
      <div class="result-meta">${p.score.toLocaleString()}</div>
    </div>`;
  }).join('');

  // All words
  const myWords = new Set(msg.players[myIndex]?.words || []);
  const aw = msg.allWords || [];
  document.getElementById('aw-count').textContent = aw.length;
  document.getElementById('aw-grid').innerHTML = aw.map(w => {
    const cls = myWords.has(w) ? 'found-by-me' : 'missed';
    return `<span class="aw-chip ${cls}">${w}<span class="aw-len"> ${w.length}</span></span>`;
  }).join('');
}

// ── UTILS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
}

let toastT;
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 2800);
}

connect();
</script>
